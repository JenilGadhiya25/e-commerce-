    <filter id="bagPurpleShadow" x="104" y="56" width="312" height="428" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>

  <g filter="url(#bagPurpleShadow)">
