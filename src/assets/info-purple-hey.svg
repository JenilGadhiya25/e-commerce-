      YOUR
    </text>
    <text
      x="260"
      y="266"
      text-anchor="middle"
      fill="#FFFFFF"
      font-size="26"
      font-family="Poppins, Arial, sans-serif"
      font-weight="700"
      letter-spacing="4"
