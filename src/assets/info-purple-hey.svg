<svg width="520" height="520" viewBox="0 0 520 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bagPurpleBody" x1="172" y1="78" x2="362" y2="458" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9B6BFF" />
      <stop offset="0.55" stop-color="#7C4DFF" />
      <stop offset="1" stop-color="#5E37E6" />
    </linearGradient>
    <linearGradient id="bagPurpleGloss" x1="212" y1="132" x2="312" y2="366" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.5" />
      <stop offset="0.35" stop-color="#FFFFFF" stop-opacity="0.18" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
