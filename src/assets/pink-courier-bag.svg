<svg width="400" height="640" viewBox="0 0 400 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="containerBody" x1="200" y1="0" x2="200" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8FBD"/>
      <stop offset="0.4" stop-color="#FF5FA8"/>
      <stop offset="0.7" stop-color="#F03D92"/>
      <stop offset="1" stop-color="#E02A85"/>
    </linearGradient>
    <linearGradient id="capHighlight" x1="200" y1="50" x2="200" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="containerShadow" x="-50" y="10" width="500" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#A01E5C" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g filter="url(#containerShadow)">
    <!-- Rounded rectangle container -->
    <rect x="50" y="50" width="300" height="520" rx="55" ry="55" fill="url(#containerBody)"/>
    <!-- Cap highlight at top edge -->
    <ellipse cx="200" cy="75" rx="100" ry="18" fill="url(#capHighlight)"/>
  </g>

  <!-- Center logo circle -->
  <circle cx="200" cy="280" r="88" fill="none" stroke="white" stroke-width="5"/>
  <text x="200" y="262" text-anchor="middle" fill="white" font-size="28" font-family="Poppins, Arial, sans-serif" font-weight="700" letter-spacing="5">YOUR</text>
  <text x="200" y="298" text-anchor="middle" fill="white" font-size="28" font-family="Poppins, Arial, sans-serif" font-weight="700" letter-spacing="5">LOGO</text>

  <!-- @YOUR ACCOUNT -->
  <text x="200" y="420" text-anchor="middle" fill="white" font-size="20" font-family="Poppins, Arial, sans-serif" font-weight="700" letter-spacing="2">@YOUR ACCOUNT</text>

  <!-- WWW.YOURWEBSITE.COM -->
  <text x="200" y="470" text-anchor="middle" fill="white" font-size="20" font-family="Poppins, Arial, sans-serif" font-weight="700" letter-spacing="2">WWW.YOURWEBSITE.COM</text>
</svg>
