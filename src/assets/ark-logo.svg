<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" role="img" aria-label="ARK Packaging Enterprise">
  <defs>
    <linearGradient id="arkA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2a7de1"/>
      <stop offset="1" stop-color="#0b5fc8"/>
    </linearGradient>
    <linearGradient id="arkB" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7dc0ff"/>
      <stop offset="1" stop-color="#2a7de1"/>
    </linearGradient>
    <linearGradient id="arkC" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1f6fd8"/>
      <stop offset="1" stop-color="#2a7de1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0b2a55" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(40 28)" filter="url(#shadow)">
    <!-- Left face -->
    <path d="M20 62 L88 24 L88 134 L20 170 Z" fill="url(#arkA)"/>
    <!-- Top face -->
    <path d="M88 24 L176 56 L108 94 L20 62 Z" fill="url(#arkB)"/>
    <!-- Right face -->
    <path d="M176 56 L176 166 L108 206 L108 94 Z" fill="url(#arkC)"/>
    <!-- Cut / stripe -->
    <path d="M46 96 L114 58 L160 78 L92 116 Z" fill="#ffffff" opacity="0.95"/>
    <path d="M46 112 L114 74 L160 94 L92 132 Z" fill="url(#arkB)" opacity="0.28"/>
    <!-- Inner notch -->
    <path d="M88 36 L152 60 L152 78 L106 102 L88 92 Z" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Text -->
  <g transform="translate(280 48)">
    <text x="0" y="88" font-family="Poppins, Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="112" font-weight="900" fill="url(#arkA)">
      ARK
    </text>
    <text x="0" y="148" font-family="Poppins, Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="900" letter-spacing="2" fill="#2a7de1">
      PACKAGING ENTERPRISE
    </text>
  </g>
</svg>

